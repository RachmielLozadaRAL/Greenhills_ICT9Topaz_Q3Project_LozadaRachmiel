<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - eSakay</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">eSakay</a>
        </div>
    </nav>
    <main class="container mt-5">
        <h2>Create an Account</h2>
        <form id="regForm" onsubmit="submitForm(event)">
            <input type="text" id="name" class="form-control" placeholder="Full Name" required>
            <input type="email" id="email" class="form-control" placeholder="Email" required>
            <input type="text" id="dob" class="form-control" placeholder="Date of Birth (MM/DD/YY)" required>
            <input type="tel" id="contact" class="form-control" placeholder="Contact Number" required>
            <input type="text" id="username" class="form-control" placeholder="Username" required>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn btn-success mt-3">Register</button>
        </form>
    </main>
    <footer class="bg-light text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 eSakay. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="proj.js"></script>
</body>

</html>
